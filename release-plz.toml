# release-plz configuration.
#
# Trigger: every push to main runs release-plz, which opens (or updates) a
# "chore: release" PR with a bumped version and a CHANGELOG entry generated
# from the new commits (conventional-commit prefixes drive the bump). Merging
# that PR creates a git tag, which fires .github/workflows/release.yml
# (cargo-dist) to build the `cat198x` CLI and attach the archives to a GitHub
# Release.
#
# publish = false: we do NOT publish to crates.io (the binary ships via the
# GitHub Release instead). git_release_enable = false: cargo-dist owns the
# GitHub Release, not release-plz — release-plz only bumps, changelogs, and tags.
[workspace]
publish = false
git_release_enable = false
git_tag_enable = true
changelog_update = true
