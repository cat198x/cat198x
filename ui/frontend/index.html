<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cat198x</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Cat198x</h1>
      <div class="tabs">
        <button class="tab active" data-view="status">Status</button>
        <button class="tab" data-view="plan">Plan</button>
      </div>
      <button id="refresh" title="Reload from the catalogue">↻ Refresh</button>
    </header>

    <main>
      <section id="status-view" class="view active">
        <div id="status-body" class="loading">Loading collection status…</div>
      </section>

      <section id="plan-view" class="view">
        <div id="plan-body" class="loading">Loading plan…</div>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
