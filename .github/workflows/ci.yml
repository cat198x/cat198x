name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Format and lint run as separate jobs so the workflow summary surfaces
  # them independently. Both are fast (no test compile); the heavier
  # coverage and build jobs gate on both passing.
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read pinned toolchain
        # rust-toolchain.toml is the single source of truth across local +
        # CI. dtolnay/rust-toolchain@master no longer auto-reads it, so we
        # extract the channel here and pass it explicitly. Edit the pin in
        # rust-toolchain.toml only.
        id: toolchain
        run: |
          channel=$(awk -F'"' '/^channel/{print $2}' rust-toolchain.toml)
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read pinned toolchain
        id: toolchain
        run: |
          channel=$(awk -F'"' '/^channel/{print $2}' rust-toolchain.toml)
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Coverage is also the test runner: cargo-llvm-cov compiles and runs every
  # test under instrumentation, so one pass gives both the regression signal
  # and coverage metrics. Gated on fmt + clippy so a fast lint failure
  # doesn't waste the instrumented compile.
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    env:
      # Anti-regression floor (current total ~78% line). Ratchet up as the
      # suite grows; this is the lowest acceptable, not the target.
      COVERAGE_GATE_THRESHOLD: 75
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read pinned toolchain
        id: toolchain
        run: |
          channel=$(awk -F'"' '/^channel/{print $2}' rust-toolchain.toml)
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run coverage suite
        # This is the test step too — pass/fail here is the regression gate.
        run: ./scripts/coverage.sh

      - name: Enforce coverage floor
        run: ./scripts/coverage-gate.sh

      - name: Publish coverage summary
        if: always()
        run: |
          total_line="$(grep '^TOTAL' target/llvm-cov/coverage-summary.txt | tail -n 1)"
          {
            echo "## Coverage"
            echo
            echo '```text'
            echo "${total_line}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            target/llvm-cov/coverage-summary.txt
            target/llvm-cov/lcov.info
            target/llvm-cov/html

  # Cross-platform smoke compile. Proves the workspace builds on macOS
  # (primary dev host) and Windows without paying for a full test run
  # there. The bundled SQLite (rusqlite) compiles via the runners' C
  # toolchain, and reqwest uses the platform-native TLS, so no extra
  # install is needed on either OS.
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [fmt, clippy]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read pinned toolchain
        id: toolchain
        shell: bash
        run: |
          channel=$(awk -F'"' '/^channel/{print $2}' rust-toolchain.toml)
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.os }}

      - name: Check workspace
        run: cargo check --workspace --all-targets
