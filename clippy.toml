# The workspace denies clippy::unwrap_used and clippy::dbg_macro so production
# code never panics on a None/Err or ships a stray dbg!. Tests are exempt:
# unwrap/expect/dbg are the normal, readable idiom in test bodies, where a panic
# *is* the failure signal. (Asm198x needs no such file — it has no test unwraps;
# this rescue carries hundreds.)
allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-dbg-in-tests = true
